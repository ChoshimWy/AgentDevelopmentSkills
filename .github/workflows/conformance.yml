name: Cross-platform Conformance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_channel:
        description: Clean candidate channel to freeze into the qualification handoff
        required: true
        default: beta
        type: choice
        options: [beta, stable]
      review_key_id:
        description: SHA-256 identity of the external release-review signing key
        required: true
        type: string

permissions:
  contents: read

jobs:
  bootstrap-distribution:
    name: Bootstrap (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install pinned Rust toolchain for Windows native source smoke
        if: runner.os == 'Windows'
        run: rustup toolchain install 1.97.1 --profile minimal
      - name: Preload the locked Cargo cache for the offline bootstrap build
        if: runner.os == 'Windows'
        run: cargo fetch --locked
      - name: Run distribution contract tests
        env:
          PYTHONPATH: src
        run: python -m unittest tests.test_distribution -v
      - name: Validate POSIX bootstrap syntax
        if: runner.os != 'Windows'
        run: |
          bash -n install.sh
          bash -n uninstall.sh
      - name: Validate PowerShell bootstrap syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: $null = [scriptblock]::Create((Get-Content -Raw ./install.ps1))
      - name: Execute PowerShell source-checkout bootstrap
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          function Invoke-ExpectedInstallerFailure {
            param([string[]]$Arguments)
            $output = & pwsh -NoProfile -File ./install.ps1 @Arguments 2>&1
            [pscustomobject]@{
              ExitCode = [int]$LASTEXITCODE
              Output = @($output)
            }
          }
          $target = Join-Path $env:RUNNER_TEMP ("agent-skills-windows-source-smoke-" + [guid]::NewGuid())
          try {
            $env:AGENT_SKILLS_PYTHON = "C:\definitely-missing\python.exe"
            $output = & ./install.ps1 --platform desktop --target-root $target --json
            if ($LASTEXITCODE -ne 0) { throw "install.ps1 failed with exit code $LASTEXITCODE" }
            $report = $output | ConvertFrom-Json
            if ($report.status -ne "installed") { throw "unexpected install.ps1 report status" }
            if ($report.engine -ne "rust") { throw "PowerShell source checkout did not select Rust" }
            if (Test-Path Env:AGENT_SKILLS_INSTALL_ENGINE_SELECTED) {
              throw "PowerShell source checkout leaked its selected engine"
            }
            foreach ($relative in @(".agent-skills", "AGENTS.md", "skills")) {
              if (-not (Test-Path -LiteralPath (Join-Path $target $relative))) {
                throw "PowerShell native install did not publish $relative"
              }
            }
            $env:AGENT_SKILLS_PYTHON = (Get-Command python -ErrorAction Stop).Source
            $occupied = Invoke-ExpectedInstallerFailure @("--platform", "desktop", "--target-root", $target, "--dry-run", "--json")
            if ($occupied.ExitCode -ne 2) { throw "occupied PowerShell compatibility route did not fail closed: $($occupied.Output | Out-String)" }
            if (($occupied.Output | Out-String) -notmatch "refusing to overwrite unmanaged or modified install roots") {
              throw "occupied PowerShell target did not preserve the Python compatibility failure: $($occupied.Output | Out-String)"
            }
            $compatibilityTarget = "${target}-python"
            $env:AGENT_SKILLS_INSTALL_ENGINE = "python"
            $compatibilityOutput = & ./install.ps1 --platform desktop --target-root $compatibilityTarget --dry-run --json
            if ($LASTEXITCODE -ne 0) { throw "forced Python compatibility route failed" }
            $compatibilityReport = $compatibilityOutput | ConvertFrom-Json
            if ($compatibilityReport.status -ne "planned" -or
                $compatibilityReport.engine -ne "python-source") {
              throw "forced Python compatibility route did not preserve engine provenance"
            }
            $env:AGENT_SKILLS_INSTALL_ENGINE = "rust"
            $blocked = Invoke-ExpectedInstallerFailure @("--platform", "apple", "--target-root", "${target}-apple", "--dry-run", "--json")
            if ($blocked.ExitCode -ne 2) { throw "forced Rust Apple request did not fail closed: $($blocked.Output | Out-String)" }
            if (($blocked.Output | Out-String) -notmatch "forced Rust source install requires Cargo") {
              throw "forced Rust Apple request failed for an unexpected reason: $($blocked.Output | Out-String)"
            }
          } finally {
            Remove-Item Env:AGENT_SKILLS_INSTALL_ENGINE -ErrorAction SilentlyContinue
            Remove-Item Env:AGENT_SKILLS_INSTALL_ENGINE_SELECTED -ErrorAction SilentlyContinue
            Remove-Item Env:AGENT_SKILLS_PYTHON -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath $target -Recurse -Force -ErrorAction SilentlyContinue
            Remove-Item -LiteralPath "${target}-python" -Recurse -Force -ErrorAction SilentlyContinue
          }

  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run conformance
        env:
          PYTHONPATH: src
        run: python scripts/run_conformance.py

  rust-compatibility:
    name: Rust contract compatibility (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal --component rustfmt --component clippy
      - name: Check native formatting
        run: cargo fmt --check
      - name: Test native workspace
        run: cargo test --workspace --locked
      - name: Lint native workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - name: Verify Python and Rust contract parity
        env:
          AGENT_SKILLS_RUST_COMPATIBILITY: "1"
          PYTHONPATH: src
        run: python -m unittest tests.test_rust_compatibility -v

  native-binary:
    name: Native binary (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
            executable_suffix: ""
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            executable_suffix: ""
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            executable_suffix: ""
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            executable_suffix: ""
          - runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            executable_suffix: ".exe"
          - runner: windows-2025
            target: x86_64-pc-windows-msvc
            executable_suffix: ".exe"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal
      - name: Build and smoke native executable
        shell: bash
        env:
          EXECUTABLE_SUFFIX: ${{ matrix.executable_suffix }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          mkdir -p target
          git show "$GITHUB_SHA:Cargo.lock" > target/release-Cargo.lock
          cargo build --release --locked --target "$TARGET" \
            -p agent-skills-rs -p agent-release
          executable="target/$TARGET/release/agent-skills-rs$EXECUTABLE_SUFFIX"
          release_tool="target/$TARGET/release/agent-release$EXECUTABLE_SUFFIX"
          "$release_tool" record \
            --binary "$executable" \
            --cargo-lock target/release-Cargo.lock \
            --target "$TARGET" \
            --source-revision "$GITHUB_SHA" \
            --output "target/native-artifact-$TARGET"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-${{ matrix.target }}
          path: target/native-artifact-${{ matrix.target }}
          if-no-files-found: error
          retention-days: 30

  native-binary-matrix:
    name: Complete native binary matrix
    needs: native-binary
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.97.1 --profile minimal
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: native-*
          path: target/native-downloads
      - name: Merge and verify exact native matrix
        shell: bash
        run: |
          set -euo pipefail
          records=()
          while IFS= read -r -d '' record; do
            records+=(--record "$record")
          done < <(find target/native-downloads -name native-artifact-record.json -type f -print0)
          cargo run --release --locked -p agent-release -- \
            merge "${records[@]}" --output target/native-matrix
          cargo run --release --locked -p agent-release -- \
            verify \
            --index target/native-matrix/native-artifacts.json \
            --artifacts-dir target/native-matrix
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          python scripts/native_artifact_contract.py verify \
            --index target/native-matrix/native-artifacts.json \
            --artifacts-dir target/native-matrix \
            --source-revision "$GITHUB_SHA" \
            --version "$version"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-artifacts-${{ github.sha }}
          path: target/native-matrix
          if-no-files-found: error
          retention-days: 90

  python-distribution:
    name: Python artifacts (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run deterministic distribution compatibility evidence
        env:
          PYTHONPATH: src
        run: |
          python scripts/python_compatibility_evidence.py run \
            --source-revision "$GITHUB_SHA" \
            --output "$RUNNER_TEMP/python-${{ matrix.python-version }}.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-compatibility-${{ matrix.python-version }}
          path: ${{ runner.temp }}/python-${{ matrix.python-version }}.json
          if-no-files-found: error
          retention-days: 14

  python-compatibility-matrix:
    name: Python 3.11-3.14 compatibility evidence
    needs: python-distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: python-compatibility-*
          path: ${{ runner.temp }}/python-compatibility
          merge-multiple: true
      - name: Merge and validate exact compatibility matrix
        env:
          PYTHONPATH: src
        run: |
          python scripts/python_compatibility_evidence.py merge \
            "$RUNNER_TEMP"/python-compatibility/python-*.json \
            --output "$RUNNER_TEMP/python-compatibility-v1.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-compatibility-v1
          path: ${{ runner.temp }}/python-compatibility-v1.json
          if-no-files-found: error
          retention-days: 30

  release-qualification-handoff:
    name: Release qualification handoff
    if: github.event_name == 'workflow_dispatch'
    needs: [native-binary-matrix, python-compatibility-matrix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: python-compatibility-v1
          path: ${{ runner.temp }}/qualification
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: native-artifacts-${{ github.sha }}
          path: ${{ runner.temp }}/qualification/native
      - name: Resolve candidate lock and execute candidate-bound Conformance
        env:
          PYTHONPATH: src
        run: |
          python -m agent_workflow.cli install \
            --platform apple --platform desktop --dry-run \
            > "$RUNNER_TEMP/qualification/install-plan.json"
          python -m agent_workflow.cli lock resolve \
            "$RUNNER_TEMP/qualification/install-plan.json" \
            --output "$RUNNER_TEMP/qualification/agent-skills.lock" \
            > "$RUNNER_TEMP/qualification/lock-report.json"
          python scripts/run_conformance.py \
            --upgrade-lock "$RUNNER_TEMP/qualification/agent-skills.lock" \
            > "$RUNNER_TEMP/qualification/conformance-evidence.json"
      - name: Build clean release candidate
        env:
          PYTHONPATH: src
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          python scripts/build_release_bundle.py \
            --channel "$RELEASE_CHANNEL" \
            --native-artifacts-dir "$RUNNER_TEMP/qualification/native" \
            --output "$RUNNER_TEMP/qualification/release"
      - name: Freeze unsigned external-review handoff
        env:
          PYTHONPATH: src
          REVIEW_KEY_ID: ${{ inputs.review_key_id }}
        run: |
          python scripts/prepare_release_qualification.py prepare \
            --release-dir "$RUNNER_TEMP/qualification/release" \
            --candidate-lock "$RUNNER_TEMP/qualification/agent-skills.lock" \
            --conformance-evidence "$RUNNER_TEMP/qualification/conformance-evidence.json" \
            --python-compatibility-evidence "$RUNNER_TEMP/qualification/python-compatibility-v1.json" \
            --review-key-id "$REVIEW_KEY_ID" \
            --output "$RUNNER_TEMP/release-qualification-handoff"
          python scripts/prepare_release_qualification.py validate \
            "$RUNNER_TEMP/release-qualification-handoff"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-qualification-${{ github.sha }}
          path: ${{ runner.temp }}/release-qualification-handoff
          if-no-files-found: error
          retention-days: 90

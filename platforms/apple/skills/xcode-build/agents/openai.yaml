interface:
  display_name: "Xcode 构建配置"
  short_description: "处理 Build Settings、安全加固、签名、Archive 与 CI/CD"
  default_prompt: "使用 $xcode-build 处理当前 Xcode 工程的 Build Settings、security-hardening、签名、Archive/Export、CI/CD 或构建脚本。安全加固先审计 target/language/entitlement/binary dependency，修改高风险设置前展示逐 target diff 并确认；ready Xcode 官方知识源只作为 guidance，工具动作翻译到本仓合同。私有库保持主项目本地 `:path` 依赖开发、验证与独立 `code-review`。完成后以定向验证/必要验证与独立 reviewer subAgent 执行的 $code-review 收口；需要项目环境证据时按需使用 $apple-verification，需要正式 HTML 构建 / 安全 / 签名 / CI 文档时交给 $html-docs。"

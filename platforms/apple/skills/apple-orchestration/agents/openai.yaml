interface:
  display_name: "Apple 工作流编排"
  short_description: "补充 iOS/Xcode 路由与 Apple 官方知识源联邦接入"
  default_prompt: "先使用 $workflow-orchestration 的通用 checkpoint 与角色合同，再使用 $apple-orchestration 将实现路由到 $ios-feature-implementation、将验证路由到 $apple-verification；如存在本机 Xcode 官方 Skill 导出，仅通过 official_expertise packet 增强现有入口并保持 fail-closed；Apple review 必须组合 $code-review 与 $apple-code-review。"
policy:
  allow_implicit_invocation: false

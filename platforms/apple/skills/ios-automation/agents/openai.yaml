interface:
  display_name: "iOS 设备自动化"
  short_description: "iOS Simulator/真机交互、语义证据、UI smoke、replay 与诊断"
  default_prompt: >-
    使用 $ios-automation 按目标设备类型路由到 Simulator 或真机子模式，覆盖安装启动、语义 snapshot、snapshot-local refs、无障碍、UI smoke、replay、视觉证据与诊断。`interaction-evidence` 只消费 ready Xcode 官方 device-interaction 的 session/evidence 语义，不调用 Xcode MCP/DeviceInteraction 工具；执行翻译到本仓脚本，source/routing hash 纳入 evidence fingerprint。默认验证只执行最窄定向单测，设备自动化不作为所有改动的默认收口；需要最终项目证据时按需使用 $apple-verification，修改代码后仍需独立 reviewer subAgent 的 $code-review。正式 HTML 报告交给 $html-docs。

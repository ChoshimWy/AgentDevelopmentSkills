interface:
  display_name: "iOS 统一实施"
  short_description: "单入口处理 iOS 业务、UI、现代化、测试、C 安全与 SDK 架构"
  default_prompt: >-
    使用 $ios-feature-implementation 作为所有 iOS 生产代码与测试代码实施的统一入口；先根据本地项目事实选择 implementation_mode：business、swiftui、swiftui-guidance、liquid-glass、uikit、mixed-ui、advanced-swift、refactor、modernization、sdk-contract、test-implementation、test-modernization 或 c-bounds-safety，再执行最小可验证改动。Xcode 官方知识只消费 ready metadata packet 中 eligible Skill，并记录 source/routing/skill hash，不复制 Apple 原文。测试代码编写使用 test-implementation，现有测试迁移使用 test-modernization；验证执行与最终证据裁决仍交给验证链路。实现阶段输出必须包含 changed_files、summary、known_risks，并且 test_impact 与 no_test_reason 二选一必填；实现完成后默认按定向验证/no_test_reason 与独立 reviewer subAgent($code-review) 收口，不能由实现 Agent 自审。若修改私有库 / 私有组件，保持主项目本地 :path 依赖进行验证与 review。$apple-verification 仅在用户显式要求、发布前、高风险或需要项目环境证据时按需使用。

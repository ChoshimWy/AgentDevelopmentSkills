interface:
  display_name: "iOS 统一验证"
  short_description: "按 Diff 复用证据并补齐 iOS 最窄验证"
  default_prompt: >-
    使用 $ios-verification 按当前 Diff 生成 required_evidence，并通过目标项目 ./codex_verify.sh 或 ~/.codex/bin/codex_verify 接入 shared build-queue。日常走 quick-verify，当前 wrapper 只复用 exact-request 成功缓存并附着相同 in-flight 请求；Verification Session、environment/target/evidence fingerprint 与相同或更强跨请求复用仅在独立 scaffold 被实际串联且有结构化证据时声明。可归档证据或高风险改动升级 checkpoint/final lane。不要使用 Xcode MCP 或裸 xcodebuild。失败时依次读取 agent-summary.json、verification-report.json、diagnostics.json、test-summary.json、ui-summary.json 与 xcresult-summary.json，只报告首个 blocking error；Final Gate 必须校验证据新鲜度并等待独立 $code-review。不要在本 Skill 中编写生产或测试代码；测试实现转交 $ios-feature-implementation(test-implementation)，Scenario/Fixture/UI Summary 转交 $ios-automation。

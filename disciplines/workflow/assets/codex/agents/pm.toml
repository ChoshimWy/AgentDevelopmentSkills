- 平台专属验证与审查规则由已选择的平台 extension 提供，通用 PM 不选择具体工具链。

输出必须显式包含这些字段：
- "goal"
- "scope"
- "acceptance_criteria"
- "checkpoint_status"
- "first_failure"
- "next_action"
"""
